profile:
  name: standard
  description: "Balanced profile with moderate depth and moderate noise."
  concurrency: 4
  delay_ms_between_requests: 120
  max_noise_score: 7
  nmap_args:
    - "-sV"
    - "-T3"
  masscan_args:
    - "--open-only"
    - "--rate"
    - "2000"
  whatweb_args:
    - "-a"
    - "2"
  nikto_args: []
  nuclei_args: []
  sqlmap_args:
    - "--threads"
    - "2"
  wpscan_args:
    - "--plugins-detection"
    - "mixed"
  enable_service_scripts: false

scan:
  risk_mode: safe-active
